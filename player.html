<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<title>Projector Output</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #000; overflow: hidden; }

  #stage      { position: fixed; inset: 0; background: #000; overflow: hidden; }

  /* ── Cover-crop container ──
     JS sizes #player-wrap so the video fills the full viewport height (or width),
     overflow: hidden on #stage clips the bleed. */
  #player-wrap { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 1; }
  #player      { display: block; width: 100%; height: 100%; }

  #overlay {
    position: absolute; inset: 0;
    pointer-events: none;
    background-repeat: no-repeat;
    opacity: 0;
    /* transition is set dynamically per fade-in / fade-out from config */
    display: none;
  }
  #overlay.visible { opacity: 1; }

  /* In bouncing mode the overlay is a fixed-size box that JS repositions each frame.
     Override the full-screen inset so right/bottom don't stretch it. */
  #overlay.bouncing { right: auto; bottom: auto; }

  #hint {
    position: fixed; top: 1rem; right: 1rem;
    background: rgba(0,0,0,0.65); color: #f4f1ea;
    padding: 0.5rem 0.8rem;
    font-family: ui-monospace, monospace; font-size: 0.75rem;
    border-radius: 2px; z-index: 10;
  }

  /* ── Error state ── */
  #error {
    position: fixed; inset: 0;
    display: none; place-items: center;
    background: #0b0b0d; color: #ff8a6b;
    font-family: ui-monospace, monospace; font-size: 1rem;
    text-align: center; padding: 2rem; flex-direction: column; gap: 1rem;
  }
  #error a { color: #ff5a1f; }
</style>
</head>
<body>

<div id="stage">
  <div id="player-wrap">
    <div id="player"></div>
  </div>
  <div id="overlay"></div>
  <div id="hint">Press F11 for fullscreen &nbsp;·&nbsp; Space to pause</div>
</div>
<div id="error"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/pixi.min.js"></script>
<script>
  const query = new URLSearchParams(window.location.search);
  const playerRole = query.get('role') === 'follower' ? 'follower' : 'leader';
  const isFollower = playerRole === 'follower';
  const isLeader = !isFollower;
  const isPreviewMode = query.get('preview') === '1' || isFollower;
  const forceMuted = query.get('muted') === '1' || isFollower;
  const liveSessionId = query.get('session') || '';

  // ── IndexedDB helpers (mirrors index.html) ──
  async function openAppDb() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('projector-app', 3);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('workspace'))    db.createObjectStore('workspace');
        if (!db.objectStoreNames.contains('active'))       db.createObjectStore('active');
        if (!db.objectStoreNames.contains('sets'))         db.createObjectStore('sets');
        if (!db.objectStoreNames.contains('localvideos'))  db.createObjectStore('localvideos');
      };
      req.onsuccess = e => resolve(e.target.result);
      req.onerror   = e => reject(e.target.error);
    });
  }
  async function idbGet(store, key = 'v') {
    const db = await openAppDb();
    return new Promise((res, rej) => {
      const req = db.transaction(store).objectStore(store).get(key);
      req.onsuccess = () => res(req.result ?? null);
      req.onerror   = () => rej(req.error);
    });
  }

  // ── Config from manager (loaded async from IndexedDB) ──
  // { videos, images:[{imageDataUrl,duration,size,position,effect,effectSpeed,bounce,bounceSpeed}], interval, fadeIn, fadeOut, easing, quality }
  let config = null;

  // ── Module-level state ──
  // Declared here so all synchronous code in buildPlayer and callbacks can reach them
  // without hitting the TDZ (init(config) is called immediately below).
  let ytPlayer          = null;
  let playerReady       = false;
  let playerInitialised = false; // onReady re-fires on each loadVideoById; guard init to first call only
  let pendingSeek       = null;  // { index, startSeconds } queued before onReady fires
  let currentVideoIndex = 0;
  let activeVideos      = [];

  let videoTimeoutId    = null; // handle for the per-video max-duration timer
  let pendingFadeIn     = false; // true while waiting for the next video to start so we can fade the player back in
  let fadeOutEndTime    = 0;    // timestamp (ms) when the current player fade-out will be complete

  let currentImageIndex  = 0;
  let visibleImageIndex  = 0;
  let activeImages       = []; // mirrors images array for bounds-checking seek commands
  let overlayShow        = null; // the show() fn assigned by startOverlayLoop
  let overlayIntervalId  = null;
  let overlayIntervalMs  = 0;
  let overlayFadeOutMs   = 350;  // kept in sync with startOverlayLoop for use in pauseOverlay
  let overlayEasing      = 'ease';
  let bounceRafId        = null;
  let currentImageBouncing = false;
  let overlayPaused      = false;
  let overlayFadeOutTimeoutId = null;
  let overlayHideTimeoutId    = null;

  let pixiApp  = null; // PIXI.Application singleton, created lazily
  let activeFx = null; // { stop } handle for the current running effect

  let syncChannel = null;
  let syncPulseIntervalId = null;
  let pendingRemoteSnapshot = null;

  // ── Cover crop ──
  // Sizes #player-wrap so the 16:9 video fills the viewport height (or width),
  // letting #stage's overflow:hidden clip the bleed on whichever axis overflows.
  // Example at 1900×1200 (ratio 1.58 < 1.78): fills full height → width = 1200*(16/9) = 2133px,
  // so 116px are clipped on each side.
  function applyCoverCrop() {
    const vW = window.innerWidth;
    const vH = window.innerHeight;
    const aspect = 16 / 9;
    const wrap = document.getElementById('player-wrap');
    if (vW / vH > aspect) {
      // Viewport wider than 16:9 → fill width, overflow height
      wrap.style.width  = vW + 'px';
      wrap.style.height = (vW / aspect) + 'px';
    } else {
      // Viewport narrower than 16:9 (e.g. 1900×1200) → fill height, overflow width
      wrap.style.height = vH + 'px';
      wrap.style.width  = (vH * aspect) + 'px';
    }
  }

  // ── Resolution reporting ──
  // Silently writes screen + viewport dimensions to localStorage so the manager
  // can display them in its UI. No visible element added to the player.
  function reportResolution() {
    const dpr   = window.devicePixelRatio || 1;
    const physW = Math.round(window.screen.width  * dpr);
    const physH = Math.round(window.screen.height * dpr);
    try {
      localStorage.setItem('projector_screen_res', JSON.stringify({
        physW, physH,
        viewW: window.innerWidth,
        viewH: window.innerHeight,
      }));
    } catch { /* non-fatal */ }
  }

  applyCoverCrop();
  if (isLeader) reportResolution();
  window.addEventListener('resize', () => {
    applyCoverCrop();
    if (isLeader) reportResolution();
    if (pixiApp) pixiApp.renderer.resize(window.innerWidth, window.innerHeight);
    if (activeFx?.relayout) activeFx.relayout();
    else if (activeFx?.sprite) layoutSprite(activeFx.sprite, activeFx.img, activeFx.texture);
  });
  initSyncBus();

  (async () => {
    config = await idbGet('active');
    if (!config) showError('No active set found. <a href="index.html">Go back to the manager</a> and click Launch.');
    else init(config);
  })();

  // ── YouTube API load watchdog ──
  // If the API script never calls back (network blip, blocked, etc.), fail visibly
  // rather than sitting on a black screen forever.
  setTimeout(() => {
    if (!ytPlayer) showError('YouTube API failed to load. Check your internet connection and <a href="">reload this page</a>.');
  }, 8000);

  function init({ videos, images, interval, fadeIn = 0.35, fadeOut = 0.35, easing = 'ease', quality = 'default', videoTimeout = 0 }) {
    if (!images?.length) { showError('No images in this set.'); return; }
    document.getElementById('overlay').style.backgroundImage = `url(${images[0].imageDataUrl})`;
    const hintEl = document.getElementById('hint');
    if (isPreviewMode) hintEl.remove();
    else setTimeout(() => hintEl.remove(), 6000);

    if (!videos?.length) { showError('No videos in this set.'); return; }
    const firstUrl = typeof videos[0] === 'string' ? videos[0] : videos[0].url;
    const first = parseYouTube(firstUrl);
    if (!first) {
      let validUrl = false;
      try { new URL(firstUrl?.trim() ?? ''); validUrl = true; } catch {}
      if (!validUrl) { showError('Invalid video URL in the saved set.'); return; }
    }
    buildPlayer(videos, { images, interval, fadeIn, fadeOut, easing, quality, videoTimeout });
  }

  function showError(html) {
    document.getElementById('stage').style.display = 'none';
    const el = document.getElementById('error');
    el.style.display = 'grid';
    el.innerHTML = html;
  }

  // ── Inter-window state / command bus ──
  // Manager reads projector_state; manager writes projector_command.
  function nowPlaying() {
    const state = ytPlayer?.getPlayerState?.();
    return state === 1;
  }

  function currentPlaybackTime() {
    const t = Number(ytPlayer?.getCurrentTime?.() ?? 0);
    return Number.isFinite(t) ? t : 0;
  }

  function makeSnapshot() {
    return {
      type: 'snapshot',
      videoIndex: currentVideoIndex,
      imageIndex: visibleImageIndex,
      overlayPaused,
      isPlaying: nowPlaying(),
      currentTime: currentPlaybackTime(),
      sentAt: Date.now(),
    };
  }

  function emitSnapshot() {
    if (!isLeader || !syncChannel) return;
    try { syncChannel.postMessage(makeSnapshot()); } catch { /* non-fatal */ }
  }

  function writeState() {
    const state = {
      videoIndex: currentVideoIndex,
      imageIndex: visibleImageIndex,
      overlayPaused,
      isPlaying: nowPlaying(),
      currentTime: currentPlaybackTime(),
      sentAt: Date.now(),
    };
    try {
      if (isLeader) localStorage.setItem('projector_state', JSON.stringify(state));
    } catch { /* non-fatal – manager will hold its last-known state */ }
    emitSnapshot();
  }

  // ── Faded seek ──
  // Fades the player out, seeks, then fades back in for a clean visual transition.
  function seekVideoFaded(index) {
    const wrap = document.getElementById('player-wrap');
    wrap.style.opacity = '0';
    setTimeout(() => {
      seekVideo(index);
      wrap.style.opacity = '1';
    }, 300);
  }

  function seekVideo(index, startSeconds) {
    if (!activeVideos[index]) return;
    if (!ytPlayer || !playerReady) { pendingSeek = { index, startSeconds }; return; }
    const video = activeVideos[index];
    currentVideoIndex = index;
    const effectiveStart = startSeconds > 0 ? startSeconds : (video.startAt || 0);
    loadVideoAt(video, effectiveStart);
    writeState();
  }

  function seekImage(index) {
    if (!overlayShow || !activeImages.length) return;
    currentImageIndex = Math.max(0, Math.min(index, activeImages.length - 1));
    clearInterval(overlayIntervalId);
    overlayShow();
    // Don't restart the interval if cycling is currently paused
    if (!overlayPaused) overlayIntervalId = setInterval(overlayShow, overlayIntervalMs);
  }

  // ── Overlay pause / resume ──
  function pauseOverlay() {
    overlayPaused = true;
    clearInterval(overlayIntervalId);
    overlayIntervalId = null;
    // Fade out immediately if an image is currently on screen
    const overlay = document.getElementById('overlay');
    if (overlay.classList.contains('visible')) {
      overlay.style.transition = `opacity ${overlayFadeOutMs / 1000}s ${overlayEasing}`;
      overlay.classList.remove('visible');
      if (!currentImageBouncing) setTimeout(() => { overlay.style.display = 'none'; }, overlayFadeOutMs + 50);
    }
    if (activeFx) hideFx(overlayFadeOutMs / 1000, overlayEasing);
    writeState();
  }

  function resumeOverlay() {
    if (!overlayShow) return;
    overlayPaused = false;
    // Show immediately rather than making the operator wait a full interval
    overlayShow();
    overlayIntervalId = setInterval(overlayShow, overlayIntervalMs);
    // writeState() is called inside overlayShow
  }

  window.addEventListener('storage', (e) => {
    if (isFollower) return;
    if (e.key !== 'projector_command') return;
    try {
      const cmd = JSON.parse(e.newValue);
      if      (cmd.type === 'seek-video')     seekVideoFaded(cmd.index);
      else if (cmd.type === 'seek-image')     seekImage(cmd.index);
      else if (cmd.type === 'pause-overlay')  pauseOverlay();
      else if (cmd.type === 'resume-overlay') resumeOverlay();
    } catch { /* ignore malformed */ }
  });

  function clampIndex(i, max) {
    if (!Number.isFinite(i)) return 0;
    if (max <= 0) return 0;
    return Math.max(0, Math.min(Math.floor(i), max - 1));
  }

  function applyRemoteSnapshot(snapshot) {
    if (!isFollower || !snapshot || snapshot.type !== 'snapshot') return;
    if (!ytPlayer || !playerReady) {
      pendingRemoteSnapshot = snapshot;
      return;
    }

    const targetVideo = clampIndex(Number(snapshot.videoIndex), activeVideos.length);
    const targetImage = clampIndex(Number(snapshot.imageIndex), activeImages.length);
    const targetTime = Number(snapshot.currentTime);
    const hasTime = Number.isFinite(targetTime) && targetTime >= 0;

    if (targetVideo !== currentVideoIndex) {
      seekVideo(targetVideo, hasTime ? targetTime : undefined);
    } else if (hasTime) {
      const drift = Math.abs(currentPlaybackTime() - targetTime);
      if (drift > 1.25) ytPlayer.seekTo?.(targetTime, true);
    }

    if (activeImages.length && targetImage !== visibleImageIndex) {
      seekImage(targetImage);
    }

    const isPlaying = !!snapshot.isPlaying;
    const currentState = ytPlayer.getPlayerState?.();
    if (isPlaying && currentState !== 1) ytPlayer.playVideo?.();
    if (!isPlaying && currentState === 1) ytPlayer.pauseVideo?.();

    if (snapshot.overlayPaused && !overlayPaused) pauseOverlay();
    if (!snapshot.overlayPaused && overlayPaused) resumeOverlay();
  }

  function initSyncBus() {
    if (!liveSessionId || typeof BroadcastChannel === 'undefined') return;
    syncChannel = new BroadcastChannel(`projector-sync:${liveSessionId}`);
    syncChannel.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;
      if (isLeader && msg.type === 'hello') emitSnapshot();
      if (isFollower && msg.type === 'snapshot') applyRemoteSnapshot(msg);
    });
    if (isLeader) {
      syncPulseIntervalId = setInterval(emitSnapshot, 900);
      emitSnapshot();
    } else {
      const hello = () => {
        try { syncChannel.postMessage({ type: 'hello', role: 'follower' }); } catch { /* non-fatal */ }
      };
      hello();
      setTimeout(hello, 350);
      setTimeout(hello, 1200);
    }
    window.addEventListener('beforeunload', () => {
      if (syncPulseIntervalId) clearInterval(syncPulseIntervalId);
      if (syncChannel) syncChannel.close();
      syncPulseIntervalId = null;
      syncChannel = null;
    });
  }

  // ── YouTube URL parser ──
  function parseYouTube(url) {
    try {
      const u = new URL(url.trim());
      const host = u.hostname.replace(/^www\./, '');
      let videoId = null;
      const listId = u.searchParams.get('list');
      if (host === 'youtu.be') {
        videoId = u.pathname.slice(1) || null;
      } else if (host.endsWith('youtube.com')) {
        if      (u.pathname === '/watch')              videoId = u.searchParams.get('v');
        else if (u.pathname.startsWith('/embed/'))     videoId = u.pathname.split('/')[2] || null;
        else if (u.pathname.startsWith('/live/'))      videoId = u.pathname.split('/')[2] || null;
        else if (u.pathname.startsWith('/shorts/'))    videoId = u.pathname.split('/')[2] || null;
      }
      if (!videoId && !listId) return null;
      return { videoId, listId };
    } catch { return null; }
  }

  // ── Load helper: YouTube or local/direct URL, uses module-level ytPlayer ──
  function loadVideoAt(videoObj, start) {
    const s = start != null ? start : (videoObj.startAt || 0);
    const parsed = parseYouTube(videoObj.url);
    if (parsed) {
      if (parsed.listId) ytPlayer.loadPlaylist({ list: parsed.listId, listType: 'playlist' });
      else if (parsed.videoId) ytPlayer.loadVideoById(s > 0 ? { videoId: parsed.videoId, startSeconds: s } : parsed.videoId);
      if (config.quality !== 'default') ytPlayer.setPlaybackQuality(config.quality);
    } else {
      ytPlayer.loadVideoById(s > 0 ? { videoId: videoObj.url, startSeconds: s } : videoObj.url);
    }
  }

  // ── HTML5 video adapter (mirrors YT.Player API so all existing code works unchanged) ──
  function buildHtml5Player(firstVideo, onReady, onStateChange, onError) {
    const vid = document.createElement('video');
    vid.style.cssText = 'display:block;width:100%;height:100%;object-fit:contain;background:#000;';
    vid.setAttribute('playsinline', '');
    vid.muted = forceMuted;
    document.getElementById('player').appendChild(vid);
    let started = false;
    const adapter = {
      loadVideoById(arg) {
        const src   = typeof arg === 'string' ? arg : arg.videoId;
        const start = typeof arg === 'object' ? (arg.startSeconds ?? 0) : 0;
        vid.src = src;
        if (start > 0) vid.currentTime = start;
        if (started) vid.play().catch(() => {});
      },
      loadPlaylist()       {},
      playVideo()          { vid.play().catch(() => {}); },
      pauseVideo()         { vid.pause(); },
      getCurrentTime()     { return vid.currentTime; },
      getPlayerState()     { return (!vid.paused && !vid.ended) ? 1 : vid.ended ? 0 : vid.paused ? 2 : 3; },
      setPlaybackQuality() {},
      seekTo(s)            { vid.currentTime = s; },
      mute()               { vid.muted = true; },
      unMute()             { vid.muted = false; },
    };
    vid.addEventListener('canplay',  () => { if (!started) { started = true; onReady({ target: adapter }); } });
    vid.addEventListener('play',     () => onStateChange({ data: 1, target: adapter }));
    vid.addEventListener('pause',    () => { if (!vid.ended) onStateChange({ data: 2, target: adapter }); });
    vid.addEventListener('ended',    () => onStateChange({ data: 0, target: adapter }));
    vid.addEventListener('waiting',  () => onStateChange({ data: 3, target: adapter }));
    vid.addEventListener('error',    () => onError({ data: 5, target: adapter }));
    const s = firstVideo.startAt || 0;
    adapter.loadVideoById(s > 0 ? { videoId: firstVideo.url, startSeconds: s } : firstVideo.url);
    return adapter;
  }

  // ── Player ──
  function buildPlayer(rawVideos, { images, interval, fadeIn, fadeOut, easing, quality, videoTimeout, videoFadeDuration = 2 }) {
    const videos = rawVideos.map(v => typeof v === 'string' ? { url: v, startAt: 0 } : v);
    activeVideos = videos;
    activeImages = images;
    const firstParsed = parseYouTube(videos[0].url);
    let stallTimer = null;

    function scheduleVideoTimeout() {
      clearTimeout(videoTimeoutId);
      videoTimeoutId = null;
      if (!videoTimeout || videoTimeout <= 0) return;
      videoTimeoutId = setTimeout(timeoutAdvance, videoTimeout * 1000);
    }

    function timeoutAdvance() {
      clearTimeout(videoTimeoutId);
      videoTimeoutId = null;
      const wrap = document.getElementById('player-wrap');
      wrap.style.transition = `opacity ${videoFadeDuration}s ease`;
      wrap.style.opacity = '0';
      pendingFadeIn = true;
      fadeOutEndTime = Date.now() + videoFadeDuration * 1000;
      currentVideoIndex = (currentVideoIndex + 1) % videos.length;
      loadVideoAt(videos[currentVideoIndex]);
      writeState();
    }

    function handleReady(e) {
      playerReady = true;
      if (playerInitialised) return;
      playerInitialised = true;
      e.target.playVideo();
      if (forceMuted) e.target.mute?.();
      if (quality !== 'default') e.target.setPlaybackQuality(quality);
      startOverlayLoop(interval, images, fadeIn, fadeOut, easing);
      writeState();
      if (isFollower && pendingRemoteSnapshot) {
        const snapshot = pendingRemoteSnapshot;
        pendingRemoteSnapshot = null;
        applyRemoteSnapshot(snapshot);
      }
      if (pendingSeek) {
        const { index, startSeconds } = pendingSeek;
        pendingSeek = null;
        seekVideo(index, startSeconds);
      }
    }

    function handleStateChange(e) {
      clearTimeout(stallTimer);
      if (e.data === -1 || e.data === 3) {
        clearTimeout(videoTimeoutId);
        videoTimeoutId = null;
        const resumeAt = ytPlayer.getCurrentTime?.() ?? 0;
        stallTimer = setTimeout(() => seekVideo(currentVideoIndex, resumeAt), 30000);
      }
      if (e.data === 1) {
        if (pendingFadeIn) {
          pendingFadeIn = false;
          const remaining = fadeOutEndTime - Date.now();
          const doFadeIn = () => {
            const wrap = document.getElementById('player-wrap');
            wrap.style.transition = `opacity ${videoFadeDuration}s ease`;
            wrap.style.opacity = '1';
          };
          if (remaining > 0) setTimeout(doFadeIn, remaining); else doFadeIn();
        }
        scheduleVideoTimeout();
        writeState();
      }
      if (e.data === 2) {
        clearTimeout(videoTimeoutId);
        videoTimeoutId = null;
        writeState();
      }
      if (e.data === 0) {
        clearTimeout(videoTimeoutId);
        videoTimeoutId = null;
        if (videos.length > 1) {
          currentVideoIndex = (currentVideoIndex + 1) % videos.length;
          loadVideoAt(videos[currentVideoIndex]);
          writeState();
        }
      }
      emitSnapshot();
    }

    function handleError(e) {
      if ((e.data === 100 || e.data === 101 || e.data === 150) && videos.length > 1) {
        currentVideoIndex = (currentVideoIndex + 1) % videos.length;
        loadVideoAt(videos[currentVideoIndex]);
        writeState();
        return;
      }
      const msgs = {
        2: 'Invalid video ID.', 5: 'HTML5 player error – the video may have an unsupported format.',
        100: 'Video not found or private.', 101: 'Embedding disabled by owner.', 150: 'Embedding disabled by owner.',
      };
      showError('Player error ' + e.data + ': ' + (msgs[e.data] || 'Unknown error.'));
    }

    // Local / blob / direct URL – skip YouTube IFrame entirely
    if (videos[0].url && !firstParsed) {
      ytPlayer = buildHtml5Player(videos[0], handleReady, handleStateChange, handleError);
      return;
    }

    // ── YouTube IFrame path ──
    const first = firstParsed;
    const playerVars = {
      autoplay: 1, controls: 0, rel: 0, modestbranding: 1,
      playsinline: 1, fs: 0, iv_load_policy: 3, enablejsapi: 1,
      origin: window.location.origin,
    };
    if (forceMuted) playerVars.mute = 1;
    if (first.listId) { playerVars.listType = 'playlist'; playerVars.list = first.listId; }
    if (videos[0].startAt > 0) playerVars.start = videos[0].startAt;

    const cfg = {
      width: '100%', height: '100%',
      host: 'https://www.youtube.com',
      playerVars,
      events: { onReady: handleReady, onStateChange: handleStateChange, onError: handleError },
    };
    if (first.videoId) cfg.videoId = first.videoId;

    const create = () => { ytPlayer = new YT.Player('player', cfg); };
    window.YT && window.YT.Player ? create() : (window.onYouTubeIframeAPIReady = create);
  }

  // ── Pixi FX engine ──
  // GPU-based distortion effects using PixiJS v7 + pixi-filters.
  // The ticker runs only while an FX overlay is on screen; between cycles it is
  // stopped entirely so the GPU sits idle during the long pauses between overlays.

  function initPixi() {
    if (pixiApp) return;
    pixiApp = new PIXI.Application({
      width:           window.innerWidth,
      height:          window.innerHeight,
      backgroundAlpha: 0,
      antialias:       false,
      resolution:      1,
      autoStart:       false,
    });
    const canvas = pixiApp.view;
    canvas.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:1;opacity:0;display:none;transition:none;';
    document.getElementById('stage').appendChild(canvas);

    // [DEBUG] Log the WebGL context attributes so we can see how alpha/premultiply are configured
    const gl = pixiApp.renderer.gl;
    const ctxAttrs = gl.getContextAttributes();
    console.log('[FX DEBUG] WebGL context attributes:', ctxAttrs);
    console.log('[FX DEBUG] premultipliedAlpha:', ctxAttrs.premultipliedAlpha, '| alpha:', ctxAttrs.alpha);
  }

  function stopFx() {
    if (activeFx) { activeFx.stop(); activeFx = null; }
    if (!pixiApp) return;
    pixiApp.ticker.stop();
    pixiApp.stage.removeChildren();
    const canvas = pixiApp.view;
    canvas.style.opacity = '0';
    canvas.style.display = 'none';
  }

  function getSpriteRect(img, texture) {
    const vpW  = window.innerWidth;
    const vpH  = window.innerHeight;
    const pct  = img.size ?? 80;
    const w    = vpW * pct / 100;
    const h    = w * (texture.height / texture.width);
    const parts = (img.position || 'center center').split(' ');
    const xKey = parts[0] || 'center';
    const yKey = parts[1] || 'center';
    const KMAP = { left: 0, center: 0.5, right: 1, top: 0, bottom: 1 };
    const fx = xKey in KMAP ? KMAP[xKey] : (parseFloat(xKey) || 50) / 100;
    const fy = yKey in KMAP ? KMAP[yKey] : (parseFloat(yKey) || 50) / 100;
    return {
      x: fx * (vpW - w),
      y: fy * (vpH - h),
      width: w,
      height: h,
    };
  }

  function layoutSprite(sprite, img, texture) {
    const rect = getSpriteRect(img, texture);
    sprite.x      = rect.x;
    sprite.y      = rect.y;
    sprite.width  = rect.width;
    sprite.height = rect.height;
  }

  function getCenteredRect(img, texture) {
    const rect = getSpriteRect({ ...img, position: 'center center' }, texture);
    return rect;
  }

  function clamp(value, min, max) {
    return Math.min(max, Math.max(min, value));
  }

  function randBetween(min, max) {
    return min + Math.random() * (max - min);
  }

  function drawCursorShape(isPressed) {
    const g = new PIXI.Graphics();
    const pressShift = isPressed ? 2 : 0;
    const pressScale = isPressed ? 0.97 : 1;
    g.lineStyle(4, 0x111111, 1, 0.5, true);
    g.beginFill(0xffffff, 1);
    g.moveTo(0, 0);
    g.lineTo(0, 72 * pressScale);
    g.lineTo(18 * pressScale, 54 * pressScale + pressShift);
    g.lineTo(30 * pressScale, 84 * pressScale + pressShift);
    g.lineTo(43 * pressScale, 78 * pressScale + pressShift);
    g.lineTo(31 * pressScale, 48 * pressScale + pressShift);
    g.lineTo(55 * pressScale, 48 * pressScale + pressShift);
    g.closePath();
    g.endFill();
    return g;
  }

  function buildCursorSprite() {
    const wrap = new PIXI.Container();
    const shadow = drawCursorShape(false);
    shadow.tint = 0x000000;
    shadow.alpha = 0.22;
    shadow.x = 5;
    shadow.y = 6;
    const up = drawCursorShape(false);
    const down = drawCursorShape(true);
    down.visible = false;
    wrap.addChild(shadow, up, down);
    wrap.pivot.set(8, 8);
    wrap.cursorUp = up;
    wrap.cursorDown = down;
    return wrap;
  }

  function showFx(img, fadeInSec, easing) {
    if (img.effect === 'worm') {
      showWormFx(img, fadeInSec, easing);
      return;
    }

    initPixi();
    stopFx();
    const htmlImg = new Image();
    htmlImg.onload = () => {
      const texture = PIXI.Texture.from(htmlImg);
      const sprite  = new PIXI.Sprite(texture);

      // [DEBUG] Log texture alpha mode — PIXI.ALPHA_MODES: 0=NPM, 1=UNPACK, 2=PMA, 3=NO_PREMULTIPLIED_ALPHA
      console.log('[FX DEBUG] texture.baseTexture.alphaMode:', texture.baseTexture.alphaMode,
        '(0=NPM, 1=UNPACK, 2=PMA, 3=NO_PREMULTIPLIED_ALPHA)');
      console.log('[FX DEBUG] texture size:', texture.width, 'x', texture.height);
      console.log('[FX DEBUG] applying effect:', img.effect, 'speed:', img.effectSpeed);

      layoutSprite(sprite, img, texture);

      const { filter, tickFn } = makeFxFilter(img.effect, img.effectSpeed);

      // [DEBUG] Add ?nofx to the player URL to skip the filter and test sprite-only rendering
      const debugNoFilter = new URLSearchParams(window.location.search).has('nofx');
      if (filter && !debugNoFilter) sprite.filters = [filter];
      console.log('[FX DEBUG] filter applied:', !!filter && !debugNoFilter, '| nofx mode:', debugNoFilter);
      console.log('[FX DEBUG] renderer.background.alpha:', pixiApp.renderer.background.alpha);

      pixiApp.stage.addChild(sprite);

      // Fade in the canvas using the same timing as the CSS overlay path
      const canvas = pixiApp.view;
      canvas.style.transition = `opacity ${fadeInSec}s ${easing}`;
      canvas.style.display    = 'block';
      canvas.style.opacity    = '0';
      void canvas.offsetWidth;
      canvas.style.opacity    = '1';

      // 30 fps is smooth enough for all effects and saves power on a fanless machine
      pixiApp.ticker.maxFPS = img.effectSpeed === 'fast' ? 60 : 30;

      // [DEBUG] After first rendered frame, read a corner pixel — should be (0,0,0,0) if canvas is transparent
      let debugDone = false;
      const debugReadPixel = () => {
        if (debugDone) return;
        debugDone = true;
        const gl = pixiApp.renderer.gl;
        const px = new Uint8Array(4);
        gl.readPixels(0, 0, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, px);
        console.log('[FX DEBUG] corner pixel (0,0) after first render: rgba(' + px[0]+','+px[1]+','+px[2]+','+px[3]+')');
        console.log('[FX DEBUG] (expect 0,0,0,0=transparent; 0,0,0,255=opaque black=bug)');
        // Also sample a pixel in the centre of the sprite where it should be opaque
        const cx = Math.round(window.innerWidth / 2), cy = Math.round(window.innerHeight / 2);
        gl.readPixels(cx, cy, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, px);
        console.log('[FX DEBUG] centre pixel ('+cx+','+cy+'): rgba('+px[0]+','+px[1]+','+px[2]+','+px[3]+')');
      };

      pixiApp.ticker.add(tickFn);
      pixiApp.ticker.add(debugReadPixel);
      pixiApp.ticker.start();

      activeFx = {
        sprite, img, texture,
        relayout: () => layoutSprite(sprite, img, texture),
        stop: () => {
          pixiApp.ticker.remove(tickFn);
          if (sprite.filters) sprite.filters = [];
        },
      };
    };
    htmlImg.src = img.imageDataUrl;
  }

  function showWormFx(img, fadeInSec, easing) {
    initPixi();
    stopFx();
    const htmlImg = new Image();
    htmlImg.onload = () => {
      const texture    = PIXI.Texture.from(htmlImg);
      const root       = new PIXI.Container();
      const stampLayer = new PIXI.Container();
      const cursor     = buildCursorSprite();
      const rateCfg = {
        slow: {
          approachSpeed: 280,
          dragSpeed: [220, 300],
          pauseRange: [0.42, 0.86],
          pressDuration: [0.16, 0.22],
          releaseDuration: [0.12, 0.18],
          stampGap: [16, 24],
          turnRange: [2, 6],
          dragJitter: 0.55,
          idleDrift: 0.45,
          maxStamps: 220,
        },
        medium: {
          approachSpeed: 360,
          dragSpeed: [320, 420],
          pauseRange: [0.22, 0.54],
          pressDuration: [0.12, 0.18],
          releaseDuration: [0.1, 0.16],
          stampGap: [12, 18],
          turnRange: [3, 8],
          dragJitter: 0.82,
          idleDrift: 0.7,
          maxStamps: 320,
        },
        fast: {
          approachSpeed: 500,
          dragSpeed: [460, 620],
          pauseRange: [0.1, 0.22],
          pressDuration: [0.1, 0.14],
          releaseDuration: [0.08, 0.12],
          stampGap: [8, 14],
          turnRange: [4, 9],
          dragJitter: 1.08,
          idleDrift: 0.9,
          maxStamps: 420,
        },
      }[img.effectSpeed || 'medium'] || {
        approachSpeed: 360,
        dragSpeed: [320, 420],
        pauseRange: [0.22, 0.54],
        pressDuration: [0.12, 0.18],
        releaseDuration: [0.1, 0.16],
        stampGap: [12, 18],
        turnRange: [3, 8],
        dragJitter: 0.82,
        idleDrift: 0.7,
        maxStamps: 320,
      };

      // Example persistent stamp:
      // { x: 640, y: 320, width: 768, height: 432 }
      let rect = getCenteredRect(img, texture);
      let stampCarry = 0;
      let nextStampGap = randBetween(...rateCfg.stampGap);
      let lastStampPoint = null;
      const stamps = [];

      root.addChild(stampLayer);
      root.addChild(cursor);
      pixiApp.stage.addChild(root);

      let cursorState = {
        phase: 'approach',
        phaseTime: 0,
        phaseLimit: 0,
        pointerDown: false,
        pos: { x: 0, y: 0 },
        vel: { x: 0, y: 0 },
        target: { x: 0, y: 0 },
        route: [],
        dragSegments: [],
        routeIndex: 0,
        segmentProgress: 0,
        dragSpeed: randBetween(...rateCfg.dragSpeed),
        hasEntered: false,
      };

      function stampAt(pointerX, pointerY, force = false) {
        const prev = lastStampPoint || { x: pointerX, y: pointerY };
        const dx = pointerX - prev.x;
        const dy = pointerY - prev.y;
        const dist = Math.hypot(dx, dy);
        if (!force && dist < 1) return;

        stampCarry += dist;
        if (!force && stampCarry < nextStampGap) return;

        stampCarry = 0;
        nextStampGap = randBetween(...rateCfg.stampGap);
        lastStampPoint = { x: pointerX, y: pointerY };

        const sprite = new PIXI.Sprite(texture);
        sprite.x = pointerX - rect.width / 2;
        sprite.y = pointerY;
        sprite.width = rect.width;
        sprite.height = rect.height;
        stampLayer.addChild(sprite);
        stamps.push(sprite);

        if (stamps.length > rateCfg.maxStamps) {
          const oldest = stamps.shift();
          stampLayer.removeChild(oldest);
          oldest.destroy();
        }
      }

      function clearStamps() {
        while (stamps.length) {
          const sprite = stamps.pop();
          stampLayer.removeChild(sprite);
          sprite.destroy();
        }
        stampCarry = 0;
        nextStampGap = randBetween(...rateCfg.stampGap);
        lastStampPoint = null;
      }

      function seedRouteStartStamp() {
        if (!cursorState.route.length) return;

        // Seed each drag with a visible starting window so the cursor grabs
        // something that already exists on screen.
        stampAt(cursorState.route[0].x, cursorState.route[0].y, true);
      }

      function getPointerBounds() {
        return {
          minX: rect.width / 2 + 18,
          maxX: Math.max(rect.width / 2 + 18, window.innerWidth - rect.width / 2 - 18),
          minY: 18,
          maxY: Math.max(18, window.innerHeight - rect.height - 18),
        };
      }

      function clampPointerTarget(x, y) {
        const bounds = getPointerBounds();
        return {
          x: clamp(x, bounds.minX, bounds.maxX),
          y: clamp(y, bounds.minY, bounds.maxY),
        };
      }

      function pickPointerTarget(origin = null, minDistance = 0) {
        const bounds = getPointerBounds();
        for (let tries = 0; tries < 24; tries++) {
          const candidate = {
            x: randBetween(bounds.minX, bounds.maxX),
            y: randBetween(bounds.minY, bounds.maxY),
          };
          if (!origin || Math.hypot(candidate.x - origin.x, candidate.y - origin.y) >= minDistance) {
            return candidate;
          }
        }
        return {
          x: clamp(origin?.x ?? (bounds.minX + bounds.maxX) / 2, bounds.minX, bounds.maxX),
          y: clamp(origin?.y ?? (bounds.minY + bounds.maxY) / 2, bounds.minY, bounds.maxY),
        };
      }

      function buildDragRoute() {
        // Keep each drag unpredictable while capping the number of turns below ten.
        const turnCount = Math.floor(randBetween(rateCfg.turnRange[0], rateCfg.turnRange[1] + 1));
        const pointCount = turnCount + 1;
        const minDistance = Math.max(72, Math.min(window.innerWidth, window.innerHeight) * 0.08, rect.width * 0.14);
        const route = [];
        let previous = cursorState.hasEntered ? cursorState.pos : null;

        for (let i = 0; i < pointCount; i++) {
          const point = pickPointerTarget(previous, i === 0 ? minDistance : minDistance * 0.68);
          route.push(point);
          previous = point;
        }

        return route;
      }

      function easeInOutSine(t) {
        return -(Math.cos(Math.PI * t) - 1) / 2;
      }

      function sampleCatmullRom(p0, p1, p2, p3, t) {
        const t2 = t * t;
        const t3 = t2 * t;
        return {
          x: 0.5 * (
            (2 * p1.x)
            + (-p0.x + p2.x) * t
            + (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2
            + (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3
          ),
          y: 0.5 * (
            (2 * p1.y)
            + (-p0.y + p2.y) * t
            + (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t2
            + (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t3
          ),
        };
      }

      function sampleCatmullRomTangent(p0, p1, p2, p3, t) {
        const t2 = t * t;
        return {
          x: 0.5 * (
            (-p0.x + p2.x)
            + 2 * (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t
            + 3 * (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t2
          ),
          y: 0.5 * (
            (-p0.y + p2.y)
            + 2 * (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t
            + 3 * (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t2
          ),
        };
      }

      function approxCatmullLength(p0, p1, p2, p3) {
        let total = 0;
        let prev = p1;
        for (let i = 1; i <= 8; i++) {
          const point = sampleCatmullRom(p0, p1, p2, p3, i / 8);
          total += Math.hypot(point.x - prev.x, point.y - prev.y);
          prev = point;
        }
        return Math.max(1, total);
      }

      // Example segment:
      // { p0:{x:320,y:220}, p1:{x:520,y:260}, p2:{x:760,y:380}, p3:{x:900,y:310}, length:286, seed:1.7 }
      function buildDragSegments(route) {
        const segments = [];
        for (let i = 0; i < route.length - 1; i++) {
          const p0 = route[Math.max(0, i - 1)];
          const p1 = route[i];
          const p2 = route[i + 1];
          const p3 = route[Math.min(route.length - 1, i + 2)];
          segments.push({
            p0,
            p1,
            p2,
            p3,
            length: approxCatmullLength(p0, p1, p2, p3),
            seed: Math.random() * Math.PI * 2,
          });
        }
        return segments;
      }

      function placeCursorOffscreen(target = null) {
        const side = Math.floor(Math.random() * 4);
        const fallbackY = target?.y ?? window.innerHeight / 2;
        const fallbackX = target?.x ?? window.innerWidth / 2;
        if (side === 0) {
          cursorState.pos.x = -randBetween(140, 220);
          cursorState.pos.y = clamp(fallbackY + randBetween(-120, 120), 40, window.innerHeight - 40);
        } else if (side === 1) {
          cursorState.pos.x = window.innerWidth + randBetween(140, 220);
          cursorState.pos.y = clamp(fallbackY + randBetween(-120, 120), 40, window.innerHeight - 40);
        } else if (side === 2) {
          cursorState.pos.x = clamp(fallbackX + randBetween(-160, 160), 60, window.innerWidth - 60);
          cursorState.pos.y = -randBetween(140, 220);
        } else {
          cursorState.pos.x = clamp(fallbackX + randBetween(-160, 160), 60, window.innerWidth - 60);
          cursorState.pos.y = window.innerHeight + randBetween(140, 220);
        }
        cursorState.vel.x = 0;
        cursorState.vel.y = 0;
      }

      function beginNextRoute(forceOffscreen = false) {
        cursorState.route = buildDragRoute();
        cursorState.dragSegments = buildDragSegments(cursorState.route);
        cursorState.routeIndex = 0;
        cursorState.segmentProgress = 0;
        cursorState.target.x = cursorState.route[0].x;
        cursorState.target.y = cursorState.route[0].y;
        cursorState.dragSpeed = randBetween(...rateCfg.dragSpeed);
        cursorState.phase = 'approach';
        cursorState.phaseTime = 0;
        cursorState.phaseLimit = 0;
        cursorState.pointerDown = false;

        if (forceOffscreen || !cursorState.hasEntered) {
          placeCursorOffscreen(cursorState.route[0]);
          cursorState.hasEntered = true;
        }

        seedRouteStartStamp();
      }

      function moveCursorTowards(target, speed, dt, wobble = 0) {
        const dx = target.x - cursorState.pos.x;
        const dy = target.y - cursorState.pos.y;
        const dist = Math.hypot(dx, dy) || 1;
        const step = Math.min(dist, speed * clamp(dist / 140, 0.24, 1) * dt);
        cursorState.pos.x += dx / dist * step;
        cursorState.pos.y += dy / dist * step;

        if (wobble > 0) {
          const now = performance.now() * 0.001;
          cursorState.pos.x += Math.sin(now * 5.4 + cursorState.phaseTime * 7.2) * wobble;
          cursorState.pos.y += Math.cos(now * 6.1 + cursorState.phaseTime * 6.4) * wobble;
          const clamped = clampPointerTarget(cursorState.pos.x, cursorState.pos.y);
          cursorState.pos.x = clamped.x;
          cursorState.pos.y = clamped.y;
        }

        return dist;
      }

      function updateCursorVelocity(prevX, prevY, dt) {
        cursorState.vel.x = dt > 0 ? (cursorState.pos.x - prevX) / dt : 0;
        cursorState.vel.y = dt > 0 ? (cursorState.pos.y - prevY) / dt : 0;
      }

      function relayoutWorm() {
        rect = getCenteredRect(img, texture);
        clearStamps();
        beginNextRoute(true);
      }

      function tickFn(deltaFrames) {
        const dt = Math.min(0.05, deltaFrames / 60);
        const prevCursorX = cursorState.pos.x;
        const prevCursorY = cursorState.pos.y;

        cursorState.phaseTime += dt;

        if (cursorState.phase === 'approach') {
          cursorState.pointerDown = false;
          const dist = moveCursorTowards(cursorState.target, rateCfg.approachSpeed, dt);
          if (dist < 6) {
            cursorState.phase = 'press';
            cursorState.phaseTime = 0;
            cursorState.phaseLimit = randBetween(...rateCfg.pressDuration);
            stampCarry = 0;
            nextStampGap = randBetween(...rateCfg.stampGap);
            lastStampPoint = null;
          }
        } else if (cursorState.phase === 'press') {
          cursorState.pointerDown = true;
          const pressPulse = Math.sin(Math.min(Math.PI, cursorState.phaseTime / cursorState.phaseLimit * Math.PI));
          const pressTarget = {
            x: cursorState.target.x - 2.2 + pressPulse * 1.1,
            y: cursorState.target.y + 2.8 + pressPulse * 1.5,
          };
          cursorState.pos.x += (pressTarget.x - cursorState.pos.x) * Math.min(1, dt * 20);
          cursorState.pos.y += (pressTarget.y - cursorState.pos.y) * Math.min(1, dt * 20);
          stampAt(cursorState.pos.x, cursorState.pos.y, true);
          if (cursorState.phaseTime >= cursorState.phaseLimit) {
            cursorState.routeIndex = 0;
            cursorState.segmentProgress = 0;
            cursorState.phase = cursorState.dragSegments.length ? 'drag' : 'release';
            cursorState.phaseTime = 0;
            cursorState.phaseLimit = randBetween(...rateCfg.releaseDuration);
            if (cursorState.phase === 'drag') {
              cursorState.dragSpeed = randBetween(...rateCfg.dragSpeed);
            }
          }
        } else if (cursorState.phase === 'drag') {
          cursorState.pointerDown = true;
          const segment = cursorState.dragSegments[cursorState.routeIndex];
          if (!segment) {
            cursorState.phase = 'release';
            cursorState.phaseTime = 0;
            cursorState.phaseLimit = randBetween(...rateCfg.releaseDuration);
          } else {
            const speedPulse = 0.9 + Math.sin(performance.now() * 0.008 + segment.seed) * 0.14;
            const progressStep = dt * cursorState.dragSpeed * speedPulse / segment.length;
            cursorState.segmentProgress = Math.min(1, cursorState.segmentProgress + progressStep);

            const easedProgress = easeInOutSine(cursorState.segmentProgress);
            const point = sampleCatmullRom(segment.p0, segment.p1, segment.p2, segment.p3, easedProgress);
            const tangent = sampleCatmullRomTangent(segment.p0, segment.p1, segment.p2, segment.p3, easedProgress);
            const tangentLength = Math.hypot(tangent.x, tangent.y) || 1;
            const normal = { x: -tangent.y / tangentLength, y: tangent.x / tangentLength };
            const dragMidpoint = Math.sin(Math.PI * cursorState.segmentProgress);
            const handNoise = (
              Math.sin(performance.now() * 0.011 + segment.seed)
              + Math.cos(performance.now() * 0.007 + segment.seed * 1.7) * 0.55
            ) * rateCfg.dragJitter * dragMidpoint;
            const clamped = clampPointerTarget(
              point.x + normal.x * handNoise,
              point.y + normal.y * handNoise * 0.9
            );
            cursorState.pos.x = clamped.x;
            cursorState.pos.y = clamped.y;

            if (cursorState.segmentProgress >= 1) {
              cursorState.pos.x = segment.p2.x;
              cursorState.pos.y = segment.p2.y;
            }
          }

          stampAt(cursorState.pos.x, cursorState.pos.y);

          if (cursorState.segmentProgress >= 1) {
            if (cursorState.routeIndex >= cursorState.dragSegments.length - 1) {
              cursorState.phase = 'release';
              cursorState.phaseTime = 0;
              cursorState.phaseLimit = randBetween(...rateCfg.releaseDuration);
            } else {
              cursorState.routeIndex += 1;
              cursorState.segmentProgress = 0;
              cursorState.dragSpeed = randBetween(...rateCfg.dragSpeed);
            }
          }
        } else if (cursorState.phase === 'release') {
          cursorState.pointerDown = false;
          const releaseTarget = clampPointerTarget(cursorState.pos.x + 8, cursorState.pos.y - 10);
          cursorState.pos.x += (releaseTarget.x - cursorState.pos.x) * Math.min(1, dt * 16);
          cursorState.pos.y += (releaseTarget.y - cursorState.pos.y) * Math.min(1, dt * 16);
          if (cursorState.phaseTime >= cursorState.phaseLimit) {
            cursorState.phase = 'pause';
            cursorState.phaseTime = 0;
            cursorState.phaseLimit = randBetween(...rateCfg.pauseRange);
          }
        } else {
          cursorState.pointerDown = false;
          const now = performance.now() * 0.001;
          cursorState.pos.x += Math.sin(now * 4.4 + cursorState.phaseTime * 5.2) * rateCfg.idleDrift;
          cursorState.pos.y += Math.cos(now * 4.9 + cursorState.phaseTime * 5.8) * rateCfg.idleDrift;
          const clamped = clampPointerTarget(cursorState.pos.x, cursorState.pos.y);
          cursorState.pos.x = clamped.x;
          cursorState.pos.y = clamped.y;
          if (cursorState.phaseTime >= cursorState.phaseLimit) beginNextRoute();
        }

        updateCursorVelocity(prevCursorX, prevCursorY, dt);

        cursor.cursorUp.visible = !cursorState.pointerDown;
        cursor.cursorDown.visible = cursorState.pointerDown;
        cursor.x = cursorState.pos.x;
        cursor.y = cursorState.pos.y;
        const moveAngle = Math.atan2(cursorState.vel.y, cursorState.vel.x);
        const clickPhase = cursorState.phase === 'press';
        const clickPulse = clickPhase ? Math.sin(Math.min(Math.PI, cursorState.phaseTime / Math.max(0.001, cursorState.phaseLimit) * Math.PI)) : 0;
        const dragScale = cursorState.pointerDown ? 0.97 : 1;
        cursor.rotation = (Number.isFinite(moveAngle) ? moveAngle : -1.2) * 0.08 - clickPulse * 0.12;
        cursor.scale.x = dragScale + clickPulse * 0.28;
        cursor.scale.y = dragScale - clickPulse * 0.18;
      }

      beginNextRoute(true);

      // Fade in the canvas using the same timing as the CSS overlay path
      const canvas = pixiApp.view;
      canvas.style.transition = `opacity ${fadeInSec}s ${easing}`;
      canvas.style.display    = 'block';
      canvas.style.opacity    = '0';
      void canvas.offsetWidth;
      canvas.style.opacity    = '1';

      pixiApp.ticker.maxFPS = img.effectSpeed === 'fast' ? 60 : 30;
      pixiApp.ticker.add(tickFn);
      pixiApp.ticker.start();

      activeFx = {
        img, texture,
        relayout: relayoutWorm,
        handleKey: (event) => {
          if (event.code === 'KeyR') {
            event.preventDefault();
            clearStamps();
            beginNextRoute(true);
            return true;
          }
          if (event.code === 'KeyS' && activeImages.length > 1) {
            event.preventDefault();
            seekImage((visibleImageIndex + 1) % activeImages.length);
            return true;
          }
          return false;
        },
        stop: () => {
          pixiApp.ticker.remove(tickFn);
          root.destroy({ children: true });
        },
      };
    };
    htmlImg.src = img.imageDataUrl;
  }

  function hideFx(fadeOutSec, easing) {
    if (!pixiApp) return;
    const canvas = pixiApp.view;
    canvas.style.transition = `opacity ${fadeOutSec}s ${easing}`;
    canvas.style.opacity    = '0';
    setTimeout(stopFx, Math.round(fadeOutSec * 1000) + 50);
  }

  function makeFxFilter(effect, speedKey) {
    const rate = { slow: 0.3, medium: 0.8, fast: 2.5 }[speedKey ?? 'medium'] ?? 0.8;

    switch (effect) {
      case 'wave-h': {
        const f = new PIXI.Filter(undefined, `
          precision mediump float;
          varying vec2 vTextureCoord;
          uniform sampler2D uSampler;
          uniform float uTime;
          void main() {
            vec2 uv = vTextureCoord;
            uv.x += sin(uv.y * 18.0 + uTime) * 0.025;
            gl_FragColor = texture2D(uSampler, clamp(uv, 0.0, 1.0));
          }`, { uTime: 0.0 });
        return { filter: f, tickFn: d => { f.uniforms.uTime += rate * d * 0.05; } };
      }
      case 'wave-v': {
        const f = new PIXI.Filter(undefined, `
          precision mediump float;
          varying vec2 vTextureCoord;
          uniform sampler2D uSampler;
          uniform float uTime;
          void main() {
            vec2 uv = vTextureCoord;
            uv.y += sin(uv.x * 18.0 + uTime) * 0.025;
            gl_FragColor = texture2D(uSampler, clamp(uv, 0.0, 1.0));
          }`, { uTime: 0.0 });
        return { filter: f, tickFn: d => { f.uniforms.uTime += rate * d * 0.05; } };
      }
      case 'ripple': {
        const f = new PIXI.Filter(undefined, `
          precision mediump float;
          varying vec2 vTextureCoord;
          uniform sampler2D uSampler;
          uniform float uTime;
          void main() {
            vec2 uv = vTextureCoord;
            vec2 c = uv - 0.5;
            float d = length(c);
            vec2 dir = d > 0.001 ? normalize(c) : vec2(0.0);
            uv += dir * sin(d * 20.0 - uTime) * 0.025;
            gl_FragColor = texture2D(uSampler, clamp(uv, 0.0, 1.0));
          }`, { uTime: 0.0 });
        return { filter: f, tickFn: d => { f.uniforms.uTime += rate * d * 0.06; } };
      }
      case 'twist': {
        const f = new PIXI.Filter(undefined, `
          precision mediump float;
          varying vec2 vTextureCoord;
          uniform sampler2D uSampler;
          uniform float uTime;
          void main() {
            vec2 uv = vTextureCoord - 0.5;
            float d = length(uv);
            float a = atan(uv.y, uv.x) + sin(uTime) * 1.5 * max(0.0, 1.0 - d * 1.8);
            vec2 t = d * vec2(cos(a), sin(a)) + 0.5;
            gl_FragColor = texture2D(uSampler, clamp(t, 0.0, 1.0));
          }`, { uTime: 0.0 });
        return { filter: f, tickFn: d => { f.uniforms.uTime += rate * d * 0.04; } };
      }
      case 'swirl': {
        const f = new PIXI.Filter(undefined, `
          precision mediump float;
          varying vec2 vTextureCoord;
          uniform sampler2D uSampler;
          uniform float uTime;
          void main() {
            vec2 uv = vTextureCoord - 0.5;
            float d = length(uv);
            float a = atan(uv.y, uv.x) + uTime * 1.2 * max(0.0, 1.0 - d * 2.0);
            vec2 s = d * vec2(cos(a), sin(a)) + 0.5;
            gl_FragColor = texture2D(uSampler, clamp(s, 0.0, 1.0));
          }`, { uTime: 0.0 });
        return { filter: f, tickFn: d => { f.uniforms.uTime += rate * d * 0.04; } };
      }
      case 'glitch': {
        const f = new PIXI.Filter(undefined, `
          precision mediump float;
          varying vec2 vTextureCoord;
          uniform sampler2D uSampler;
          uniform float uSeed;
          void main() {
            vec2 uv = vTextureCoord;
            float slice = floor(uv.y * 10.0);
            float r1 = fract(sin(slice * 127.1 + uSeed) * 43758.5);
            float r2 = fract(sin(slice * 311.7 + uSeed * 2.0) * 17231.3);
            uv.x += (r1 - 0.5) * 0.12 * step(0.7, r2);
            gl_FragColor = texture2D(uSampler, clamp(uv, 0.0, 1.0));
          }`, { uSeed: 0.0 });
        let t = 0;
        return { filter: f, tickFn: d => {
          t += d;
          if (t > 20 / rate) { t = 0; f.uniforms.uSeed = Math.random() * 100; }
        }};
      }
      case 'pixelate': {
        const f = new PIXI.Filter(undefined, `
          precision mediump float;
          varying vec2 vTextureCoord;
          uniform sampler2D uSampler;
          uniform float uPixelSize;
          void main() {
            vec2 uv = (floor(vTextureCoord / uPixelSize) + 0.5) * uPixelSize;
            gl_FragColor = texture2D(uSampler, clamp(uv, 0.0, 1.0));
          }`, { uPixelSize: 0.01 });
        let t = 0;
        return { filter: f, tickFn: d => {
          t += d * rate * 0.04;
          f.uniforms.uPixelSize = 0.01 + 0.07 * Math.abs(Math.sin(t));
        }};
      }
      default:
        return { filter: null, tickFn: () => {} };
    }
  }

  // ── Overlay loop ──
  function startOverlayLoop(intervalSec, images, fadeIn, fadeOut, easing) {
    const overlay   = document.getElementById('overlay');
    const fadeOutMs = Math.round(fadeOut * 1000);
    overlayIntervalMs = intervalSec * 1000;
    overlayFadeOutMs  = fadeOutMs;
    overlayEasing     = easing;

    const show = () => {
      const img = images[currentImageIndex];
      visibleImageIndex = currentImageIndex;
      writeState();
      currentImageIndex = (currentImageIndex + 1) % images.length;

      stopBounce();
      clearTimeout(overlayFadeOutTimeoutId);
      clearTimeout(overlayHideTimeoutId);
      overlayFadeOutTimeoutId = null;
      overlayHideTimeoutId    = null;

      if (img.bounce) {
        currentImageBouncing = true;
        overlay.style.display = 'block';
        overlay.style.transition = `opacity ${fadeIn}s ${easing}`;
        void overlay.offsetWidth;
        overlay.classList.add('visible');
        startBounce(img);
        overlayFadeOutTimeoutId = setTimeout(() => {
          overlay.style.transition = `opacity ${fadeOut}s ${easing}`;
          overlay.classList.remove('visible');
          overlayHideTimeoutId = setTimeout(() => {
            stopBounce();
            overlay.style.display = 'none';
          }, fadeOutMs + 50);
        }, img.duration * 1000);
      } else {
        currentImageBouncing = false;
        const hasEffect = typeof PIXI !== 'undefined' && img.effect && img.effect !== 'none';
        if (hasEffect) {
          showFx(img, fadeIn, easing);
          setTimeout(() => hideFx(fadeOut, easing), img.duration * 1000);
        } else {
          overlay.style.backgroundImage    = `url(${img.imageDataUrl})`;
          overlay.style.backgroundSize     = img.size ? `${img.size}%` : '80%';
          overlay.style.backgroundPosition = img.position || 'center';
          overlay.style.display = 'block';
          overlay.style.transition = `opacity ${fadeIn}s ${easing}`;
          void overlay.offsetWidth;
          overlay.classList.add('visible');
          overlayFadeOutTimeoutId = setTimeout(() => {
            overlay.style.transition = `opacity ${fadeOut}s ${easing}`;
            overlay.classList.remove('visible');
            overlayHideTimeoutId = setTimeout(() => { overlay.style.display = 'none'; }, fadeOutMs + 50);
          }, img.duration * 1000);
        }
      }
    };

    // Expose so seekImage() can cancel and restart
    overlayShow       = show;
    show();
    overlayIntervalId = setInterval(show, overlayIntervalMs);
  }

  // ── Bounce animation ──
  function stopBounce() {
    if (bounceRafId) { cancelAnimationFrame(bounceRafId); bounceRafId = null; }
    const overlay = document.getElementById('overlay');
    overlay.classList.remove('bouncing');
    overlay.style.left = '';
    overlay.style.top  = '';
    overlay.style.width  = '';
    overlay.style.height = '';
  }

  function startBounce(img) {
    const sizePx = Math.round(Math.min(window.innerWidth, window.innerHeight) * (img.size ?? 80) / 100);
    const speedPxPerSec = img.bounceSpeed ?? 150;
    const overlay = document.getElementById('overlay');
    overlay.classList.add('bouncing');
    overlay.style.backgroundImage    = `url(${img.imageDataUrl})`;
    overlay.style.backgroundSize     = 'contain';
    overlay.style.backgroundPosition = 'center';
    overlay.style.width  = sizePx + 'px';
    overlay.style.height = sizePx + 'px';

    let x  = Math.random() * (window.innerWidth  - sizePx);
    let y  = Math.random() * (window.innerHeight - sizePx);
    let vx = speedPxPerSec * (Math.random() > 0.5 ? 1 : -1);
    let vy = speedPxPerSec * (Math.random() > 0.5 ? 1 : -1);
    let lastTime = null;

    function frame(timestamp) {
      const dt = lastTime === null ? 0 : (timestamp - lastTime) / 1000;
      lastTime = timestamp;
      x += vx * dt;
      y += vy * dt;
      if (x + sizePx >= window.innerWidth)  { x = window.innerWidth  - sizePx; vx = -Math.abs(vx); }
      if (x <= 0)                            { x = 0;                           vx =  Math.abs(vx); }
      if (y + sizePx >= window.innerHeight) { y = window.innerHeight - sizePx; vy = -Math.abs(vy); }
      if (y <= 0)                            { y = 0;                           vy =  Math.abs(vy); }
      overlay.style.left = x + 'px';
      overlay.style.top  = y + 'px';
      bounceRafId = requestAnimationFrame(frame);
    }
    bounceRafId = requestAnimationFrame(frame);
  }

  // ── Keyboard ──
  document.addEventListener('keydown', (e) => {
    if (activeFx?.handleKey?.(e)) return;
    if (isPreviewMode) return;
    if (!ytPlayer || typeof ytPlayer.getPlayerState !== 'function') return;
    if (e.code === 'Space') {
      e.preventDefault();
      ytPlayer.getPlayerState() === 1 ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
    }
  });
</script>
</body>
</html>
