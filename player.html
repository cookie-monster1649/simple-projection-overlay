<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<title>Projector Output</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #000; overflow: hidden; }

  #stage      { position: fixed; inset: 0; background: #000; overflow: hidden; }

  /* ── Cover-crop container ──
     JS sizes #player-wrap so the video fills the full viewport height (or width),
     overflow: hidden on #stage clips the bleed. */
  #player-wrap { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 1; transition: opacity 0.6s ease; }
  #player      { display: block; width: 100%; height: 100%; }

  #overlay {
    position: absolute; inset: 0;
    pointer-events: none;
    background-repeat: no-repeat;
    opacity: 0;
    /* transition is set dynamically per fade-in / fade-out from config */
    display: none;
  }
  #overlay.visible { opacity: 1; }

  /* In bouncing mode the overlay is a fixed-size box that JS repositions each frame.
     Override the full-screen inset so right/bottom don't stretch it. */
  #overlay.bouncing { right: auto; bottom: auto; }

  #hint {
    position: fixed; top: 1rem; right: 1rem;
    background: rgba(0,0,0,0.65); color: #f4f1ea;
    padding: 0.5rem 0.8rem;
    font-family: ui-monospace, monospace; font-size: 0.75rem;
    border-radius: 2px; z-index: 10;
  }

  /* ── Error state ── */
  #error {
    position: fixed; inset: 0;
    display: none; place-items: center;
    background: #0b0b0d; color: #ff8a6b;
    font-family: ui-monospace, monospace; font-size: 1rem;
    text-align: center; padding: 2rem; flex-direction: column; gap: 1rem;
  }
  #error a { color: #ff5a1f; }
</style>
</head>
<body>

<div id="stage">
  <div id="player-wrap">
    <div id="player"></div>
  </div>
  <div id="overlay"></div>
  <div id="hint">Press F11 for fullscreen &nbsp;·&nbsp; Space to pause</div>
</div>
<div id="error"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  // ── Config from manager ──
  // { videos, images:[{imageDataUrl,duration}], interval, fadeIn, fadeOut, easing, quality, bounce, bounceSize, bounceSpeed }
  const config = (() => {
    try { return JSON.parse(localStorage.getItem('projector_active') || 'null'); }
    catch { return null; }
  })();

  // ── Module-level state ──
  // Declared here so all synchronous code in buildPlayer and callbacks can reach them
  // without hitting the TDZ (init(config) is called immediately below).
  let ytPlayer          = null;
  let playerReady       = false;
  let playerInitialised = false; // onReady re-fires on each loadVideoById; guard init to first call only
  let pendingSeek       = null;  // { index, startSeconds } queued before onReady fires
  let currentVideoIndex = 0;
  let activeVideos      = [];

  let videoTimeoutId    = null; // handle for the per-video max-duration timer
  let pendingFadeIn     = false; // true while waiting for the next video to start so we can fade the player back in

  let currentImageIndex  = 0;
  let activeImages       = []; // mirrors images array for bounds-checking seek commands
  let overlayShow        = null; // the show() fn assigned by startOverlayLoop
  let overlayIntervalId  = null;
  let overlayIntervalMs  = 0;
  let overlayFadeOutMs   = 350;  // kept in sync with startOverlayLoop for use in pauseOverlay
  let overlayEasing      = 'ease';
  let overlayBouncing    = false;
  let overlayPaused      = false;

  // ── Cover crop ──
  // Sizes #player-wrap so the 16:9 video fills the viewport height (or width),
  // letting #stage's overflow:hidden clip the bleed on whichever axis overflows.
  // Example at 1900×1200 (ratio 1.58 < 1.78): fills full height → width = 1200*(16/9) = 2133px,
  // so 116px are clipped on each side.
  function applyCoverCrop() {
    const vW = window.innerWidth;
    const vH = window.innerHeight;
    const aspect = 16 / 9;
    const wrap = document.getElementById('player-wrap');
    if (vW / vH > aspect) {
      // Viewport wider than 16:9 → fill width, overflow height
      wrap.style.width  = vW + 'px';
      wrap.style.height = (vW / aspect) + 'px';
    } else {
      // Viewport narrower than 16:9 (e.g. 1900×1200) → fill height, overflow width
      wrap.style.height = vH + 'px';
      wrap.style.width  = (vH * aspect) + 'px';
    }
  }

  // ── Resolution reporting ──
  // Silently writes screen + viewport dimensions to localStorage so the manager
  // can display them in its UI. No visible element added to the player.
  function reportResolution() {
    const dpr   = window.devicePixelRatio || 1;
    const physW = Math.round(window.screen.width  * dpr);
    const physH = Math.round(window.screen.height * dpr);
    try {
      localStorage.setItem('projector_screen_res', JSON.stringify({
        physW, physH,
        viewW: window.innerWidth,
        viewH: window.innerHeight,
      }));
    } catch { /* non-fatal */ }
  }

  applyCoverCrop();
  reportResolution();
  window.addEventListener('resize', () => { applyCoverCrop(); reportResolution(); });

  if (!config) {
    showError('No active set found. <a href="index.html">Go back to the manager</a> and click Launch.');
  } else {
    init(config);
  }

  // ── YouTube API load watchdog ──
  // If the API script never calls back (network blip, blocked, etc.), fail visibly
  // rather than sitting on a black screen forever.
  setTimeout(() => {
    if (!ytPlayer) showError('YouTube API failed to load. Check your internet connection and <a href="">reload this page</a>.');
  }, 8000);

  function init({ videos, images, interval, fadeIn = 0.35, fadeOut = 0.35, easing = 'ease', quality = 'default', bounce = false, bounceSize = 200, bounceSpeed = 150, videoTimeout = 0 }) {
    if (!images?.length) { showError('No images in this set.'); return; }
    document.getElementById('overlay').style.backgroundImage = `url(${images[0].imageDataUrl})`;
    setTimeout(() => document.getElementById('hint').remove(), 6000);

    if (!videos?.length) { showError('No videos in this set.'); return; }
    const first = parseYouTube(videos[0]);
    if (!first) { showError('Invalid YouTube URL in the saved set.'); return; }
    buildPlayer(videos, { images, interval, fadeIn, fadeOut, easing, quality, bounce, bounceSize, bounceSpeed, videoTimeout });
  }

  function showError(html) {
    document.getElementById('stage').style.display = 'none';
    const el = document.getElementById('error');
    el.style.display = 'grid';
    el.innerHTML = html;
  }

  // ── Inter-window state / command bus ──
  // Manager reads projector_state; manager writes projector_command.
  function writeState() {
    try {
      localStorage.setItem('projector_state', JSON.stringify({
        videoIndex: currentVideoIndex,
        imageIndex: currentImageIndex,
        overlayPaused,
      }));
    } catch { /* non-fatal – manager will hold its last-known state */ }
  }

  // ── Faded seek ──
  // Fades the player out, seeks, then fades back in for a clean visual transition.
  function seekVideoFaded(index) {
    const wrap = document.getElementById('player-wrap');
    wrap.style.opacity = '0';
    setTimeout(() => {
      seekVideo(index);
      wrap.style.opacity = '1';
    }, 300);
  }

  function seekVideo(index, startSeconds) {
    if (!activeVideos[index]) return;
    // Queue if ytPlayer hasn't been created yet (YT API still loading) or if onReady hasn't fired
    if (!ytPlayer || !playerReady) { pendingSeek = { index, startSeconds }; return; }
    const parsed = parseYouTube(activeVideos[index]);
    if (!parsed) return;
    currentVideoIndex = index;
    if (parsed.listId) {
      ytPlayer.loadPlaylist({ list: parsed.listId, listType: 'playlist' });
    } else if (parsed.videoId) {
      // startSeconds is only passed by the stall watchdog so recovery resumes in-place
      ytPlayer.loadVideoById(startSeconds > 0 ? { videoId: parsed.videoId, startSeconds } : parsed.videoId);
    }
    if (config.quality !== 'default') ytPlayer.setPlaybackQuality(config.quality);
    writeState();
  }

  function seekImage(index) {
    if (!overlayShow || !activeImages.length) return;
    currentImageIndex = Math.max(0, Math.min(index, activeImages.length - 1));
    clearInterval(overlayIntervalId);
    overlayShow();
    // Don't restart the interval if cycling is currently paused
    if (!overlayPaused) overlayIntervalId = setInterval(overlayShow, overlayIntervalMs);
  }

  // ── Overlay pause / resume ──
  function pauseOverlay() {
    overlayPaused = true;
    clearInterval(overlayIntervalId);
    overlayIntervalId = null;
    // Fade out immediately if an image is currently on screen
    const overlay = document.getElementById('overlay');
    if (overlay.classList.contains('visible')) {
      overlay.style.transition = `opacity ${overlayFadeOutMs / 1000}s ${overlayEasing}`;
      overlay.classList.remove('visible');
      if (!overlayBouncing) setTimeout(() => { overlay.style.display = 'none'; }, overlayFadeOutMs + 50);
    }
    writeState();
  }

  function resumeOverlay() {
    if (!overlayShow) return;
    overlayPaused = false;
    // Show immediately rather than making the operator wait a full interval
    overlayShow();
    overlayIntervalId = setInterval(overlayShow, overlayIntervalMs);
    // writeState() is called inside overlayShow
  }

  window.addEventListener('storage', (e) => {
    if (e.key !== 'projector_command') return;
    try {
      const cmd = JSON.parse(e.newValue);
      if      (cmd.type === 'seek-video')     seekVideoFaded(cmd.index);
      else if (cmd.type === 'seek-image')     seekImage(cmd.index);
      else if (cmd.type === 'pause-overlay')  pauseOverlay();
      else if (cmd.type === 'resume-overlay') resumeOverlay();
    } catch { /* ignore malformed */ }
  });

  // ── YouTube URL parser ──
  function parseYouTube(url) {
    try {
      const u = new URL(url.trim());
      const host = u.hostname.replace(/^www\./, '');
      let videoId = null;
      const listId = u.searchParams.get('list');
      if (host === 'youtu.be') {
        videoId = u.pathname.slice(1) || null;
      } else if (host.endsWith('youtube.com')) {
        if      (u.pathname === '/watch')              videoId = u.searchParams.get('v');
        else if (u.pathname.startsWith('/embed/'))     videoId = u.pathname.split('/')[2] || null;
        else if (u.pathname.startsWith('/live/'))      videoId = u.pathname.split('/')[2] || null;
        else if (u.pathname.startsWith('/shorts/'))    videoId = u.pathname.split('/')[2] || null;
      }
      if (!videoId && !listId) return null;
      return { videoId, listId };
    } catch { return null; }
  }

  // ── Player ──
  function buildPlayer(videos, { images, interval, fadeIn, fadeOut, easing, quality, bounce, bounceSize, bounceSpeed, videoTimeout }) {
    activeVideos = videos;  // expose for seek commands
    activeImages = images;  // expose for bounds-checking in seekImage
    const first = parseYouTube(videos[0]);
    let stallTimer = null; // tracks buffering/unstarted watchdog

    // ── Video timeout helpers ──
    // Called whenever a video starts playing; arms the max-duration countdown.
    function scheduleVideoTimeout() {
      clearTimeout(videoTimeoutId);
      videoTimeoutId = null;
      if (!videoTimeout || videoTimeout <= 0) return;
      videoTimeoutId = setTimeout(timeoutAdvance, videoTimeout * 1000);
    }

    // Fades out the player, loads the next video, then waits for it to start
    // before fading back in. pendingFadeIn is read in the onStateChange handler.
    // Example: 4 videos at 120 s timeout → each fades at 2:00 regardless of length.
    function timeoutAdvance() {
      clearTimeout(videoTimeoutId);
      videoTimeoutId = null;
      document.getElementById('player-wrap').style.opacity = '0';
      pendingFadeIn = true;
      currentVideoIndex = (currentVideoIndex + 1) % videos.length;
      const next = parseYouTube(videos[currentVideoIndex]);
      if (!next) return;
      if (next.listId) {
        ytPlayer.loadPlaylist({ list: next.listId, listType: 'playlist' });
      } else if (next.videoId) {
        ytPlayer.loadVideoById(next.videoId);
      }
      if (quality !== 'default') ytPlayer.setPlaybackQuality(quality);
      writeState();
    }

    const playerVars = {
      autoplay: 1, controls: 0, rel: 0, modestbranding: 1,
      playsinline: 1, fs: 0, iv_load_policy: 3, enablejsapi: 1,
      origin: window.location.origin,
    };
    if (first.listId) { playerVars.listType = 'playlist'; playerVars.list = first.listId; }

    const cfg = {
      width: '100%', height: '100%',
      // youtube-nocookie.com is more restrictive and triggers error 5 on some content;
      // we're already on a localhost http origin so youtube.com is safe here
      host: 'https://www.youtube.com',
      playerVars,
      events: {
        onReady: (e) => {
          playerReady = true;
          // YouTube re-fires onReady after every loadVideoById / loadPlaylist call.
          // Guard the startup block so it only runs once.
          if (playerInitialised) return;
          playerInitialised = true;
          e.target.playVideo();
          if (quality !== 'default') e.target.setPlaybackQuality(quality);
          if (bounce) startBounce(bounceSize, bounceSpeed);
          startOverlayLoop(interval, images, fadeIn, fadeOut, easing, bounce);
          writeState();
          // Flush any seek command that arrived before the iframe was ready
          if (pendingSeek) {
            const { index, startSeconds } = pendingSeek;
            pendingSeek = null;
            seekVideo(index, startSeconds);
          }
        },
        onStateChange: (e) => {
          // ── Stall watchdog ──
          // States -1 (unstarted) and 3 (buffering) can get stuck permanently after
          // a network blip. If either persists for 30 s, force-reload from the same
          // position. Time is captured now so the seek target doesn't drift.
          clearTimeout(stallTimer);
          if (e.data === -1 || e.data === 3) {
            clearTimeout(videoTimeoutId);
            videoTimeoutId = null;
            const resumeAt = ytPlayer.getCurrentTime?.() ?? 0;
            stallTimer = setTimeout(() => seekVideo(currentVideoIndex, resumeAt), 30000);
          }

          // State 1 = playing. Fade in if we were mid-crossfade, then arm the timeout.
          if (e.data === 1) {
            if (pendingFadeIn) {
              pendingFadeIn = false;
              document.getElementById('player-wrap').style.opacity = '1';
            }
            scheduleVideoTimeout();
          }

          // State 2 = paused. Suspend the timeout – paused time shouldn't count.
          if (e.data === 2) {
            clearTimeout(videoTimeoutId);
            videoTimeoutId = null;
          }

          // State 0 = ended. Advance to next video in the list (wraps to start).
          if (e.data === 0) {
            clearTimeout(videoTimeoutId);
            videoTimeoutId = null;
            if (videos.length > 1) {
              currentVideoIndex = (currentVideoIndex + 1) % videos.length;
              const next = parseYouTube(videos[currentVideoIndex]);
              if (!next) return;
              if (next.listId) {
                ytPlayer.loadPlaylist({ list: next.listId, listType: 'playlist' });
              } else if (next.videoId) {
                ytPlayer.loadVideoById(next.videoId);
              }
              if (quality !== 'default') ytPlayer.setPlaybackQuality(quality);
              writeState();
            }
          }
        },
        onError: (e) => {
          // Errors 100, 101, 150: video unavailable or embedding disabled.
          // Skip to the next video rather than halting the show – a single blocked
          // or deleted video shouldn't take down a multi-hour session.
          if ((e.data === 100 || e.data === 101 || e.data === 150) && videos.length > 1) {
            currentVideoIndex = (currentVideoIndex + 1) % videos.length;
            const next = parseYouTube(videos[currentVideoIndex]);
            if (next) {
              if (next.listId) ytPlayer.loadPlaylist({ list: next.listId, listType: 'playlist' });
              else if (next.videoId) ytPlayer.loadVideoById(next.videoId);
              if (quality !== 'default') ytPlayer.setPlaybackQuality(quality);
              writeState();
              return;
            }
          }
          const msgs = {
            2:   'Invalid video ID.',
            5:   'HTML5 player error – the video may have restricted playback or an unsupported format.',
            100: 'Video not found or private.',
            101: 'Embedding disabled by owner.',
            150: 'Embedding disabled by owner.',
          };
          showError('YouTube error ' + e.data + ': ' + (msgs[e.data] || 'Unknown error.'));
        },
      },
    };
    if (first.videoId) cfg.videoId = first.videoId;

    const create = () => { ytPlayer = new YT.Player('player', cfg); };
    window.YT && window.YT.Player ? create() : (window.onYouTubeIframeAPIReady = create);
  }

  // ── Overlay loop ──
  function startOverlayLoop(intervalSec, images, fadeIn, fadeOut, easing, bouncing) {
    const overlay   = document.getElementById('overlay');
    const fadeOutMs = Math.round(fadeOut * 1000);
    overlayIntervalMs = intervalSec * 1000;
    overlayFadeOutMs  = fadeOutMs;   // kept in sync so pauseOverlay can use them
    overlayEasing     = easing;
    overlayBouncing   = bouncing;

    // In bounce mode the element stays in the DOM; only opacity is toggled
    if (bouncing) overlay.style.display = 'block';

    const show = () => {
      const img = images[currentImageIndex];
      // Write state before incrementing so manager sees the index of what's on screen
      writeState();
      currentImageIndex = (currentImageIndex + 1) % images.length;

      overlay.style.backgroundImage    = `url(${img.imageDataUrl})`;
      overlay.style.backgroundSize     = img.size ? `${img.size}%` : '80%';
      overlay.style.backgroundPosition = img.position || 'center';

      if (!bouncing) overlay.style.display = 'block';
      overlay.style.transition = `opacity ${fadeIn}s ${easing}`;
      void overlay.offsetWidth; // force reflow so transition fires from opacity:0
      overlay.classList.add('visible');

      setTimeout(() => {
        overlay.style.transition = `opacity ${fadeOut}s ${easing}`;
        overlay.classList.remove('visible');
        if (!bouncing) setTimeout(() => { overlay.style.display = 'none'; }, fadeOutMs + 50);
      }, img.duration * 1000);
    };

    // Expose so seekImage() can cancel and restart
    overlayShow       = show;
    show();
    overlayIntervalId = setInterval(show, overlayIntervalMs);
  }

  // ── Bounce animation ──
  function startBounce(sizePx, speedPxPerSec) {
    const overlay = document.getElementById('overlay');
    overlay.classList.add('bouncing');
    overlay.style.width  = sizePx + 'px';
    overlay.style.height = sizePx + 'px';

    // Start at a random position with a non-axis-aligned angle (avoids boring straight paths)
    let x  = Math.random() * (window.innerWidth  - sizePx);
    let y  = Math.random() * (window.innerHeight - sizePx);
    const angle = (20 + Math.random() * 70) * (Math.PI / 180); // 20–90°
    let vx = speedPxPerSec * Math.cos(angle) * (Math.random() > 0.5 ? 1 : -1);
    let vy = speedPxPerSec * Math.sin(angle) * (Math.random() > 0.5 ? 1 : -1);

    let lastTime = null;

    function frame(timestamp) {
      const dt = lastTime === null ? 0 : (timestamp - lastTime) / 1000; // seconds
      lastTime = timestamp;

      x += vx * dt;
      y += vy * dt;

      // Reflect off edges
      if (x + sizePx >= window.innerWidth)  { x = window.innerWidth  - sizePx; vx = -Math.abs(vx); }
      if (x <= 0)                            { x = 0;                           vx =  Math.abs(vx); }
      if (y + sizePx >= window.innerHeight) { y = window.innerHeight - sizePx; vy = -Math.abs(vy); }
      if (y <= 0)                            { y = 0;                           vy =  Math.abs(vy); }

      overlay.style.left = x + 'px';
      overlay.style.top  = y + 'px';
      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  }

  // ── Keyboard ──
  document.addEventListener('keydown', (e) => {
    if (!ytPlayer || typeof ytPlayer.getPlayerState !== 'function') return;
    if (e.code === 'Space') {
      e.preventDefault();
      ytPlayer.getPlayerState() === 1 ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
    }
  });
</script>
</body>
</html>
